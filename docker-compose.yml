services:
  postgres:
    image: postgres:15
    container_name: parking_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:15
    container_name: parking_postgres_test
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_TEST_NAME}
    ports:
      - '${DB_TEST_PORT}:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: parking_mongo
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  postgres_test_data:
  mongo_data:
