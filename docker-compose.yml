services:
  postgres:
    image: postgres:15
    container_name: parking_postgres
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_db
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:15
    container_name: parking_postgres_test
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_test_db
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - '5435:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: parking_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  postgres_test_data:
  mongo_data:
